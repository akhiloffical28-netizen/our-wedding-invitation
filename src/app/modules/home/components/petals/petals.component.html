<div class="petals-container" aria-hidden="true">
  @for (petal of petals; track $index) {
    <div 
      class="petal" 
      [class]="'color-' + petal.colorVariation"
      [style.left.%]="petal.left"
      [style.width.px]="petal.size"
      [style.height.px]="petal.size * 1.3"
      [style.animation-duration.s]="petal.duration"
      [style.animation-delay.s]="petal.delay"
      [style.opacity]="petal.opacity"
    >
      <svg viewBox="0 0 30 40" fill="currentColor">
        <path d="M15 0 C25 10, 30 25, 15 40 C0 25, 5 10, 15 0 Z" />
      </svg>
    </div>
  }
</div>
