<div class="main-hero-container" [class.revealed]="isRevealed">
  <section class="hero-section">
    <!-- Dynamic Background Overlay with Shimmer -->
    <div class="hero-bg-overlay"></div>

    <!-- Animated Floating Bokeh Elements -->
    <div class="bokeh-container" aria-hidden="true">
      <div class="bokeh circle-1"></div>
      <div class="bokeh circle-2"></div>
      <div class="bokeh circle-3"></div>
    </div>

    <div class="hero-content-wrapper">
      <div class="hero-card">
        
        <!-- Sub-header Tagline -->
        <div class="wedding-tagline">
          <span class="sparkle-icon">✨</span>
          <span>We Are Getting Married</span>
          <span class="sparkle-icon">✨</span>
        </div>

        <!-- Couple Names -->
        <div class="couple-names-container">
          <h1 class="groom-name">{{ groomName }}</h1>
          <div class="ampersand-wrapper">
            <span class="ampersand">&</span>
          </div>
          <h1 class="bride-name">{{ brideName }}</h1>
        </div>

        <!-- Divider line -->
        <div class="golden-divider">
          <div class="line"></div>
          <div class="heart-icon">♥</div>
          <div class="line"></div>
        </div>

        <!-- Event Description -->
        <p class="hero-description">
          Together with our families, we joyfully invite you to share in the happiness of our wedding day as we exchange our vows.
        </p>

        <!-- Venue & Location Details -->
        <div class="location-badge-container">
          <div class="location-info">
            <svg class="map-pin-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
            <div class="location-text">
              <span class="label">Wedding Venue Location</span>
              <span class="subtext">Tap below to open in Google Maps</span>
            </div>
          </div>

          <a 
            [href]="locationUrl" 
            target="_blank" 
            rel="noopener noreferrer" 
            class="location-button"
            id="hero-google-maps-btn"
          >
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
            <span>Open Map Location</span>
            <svg class="external-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/>
            </svg>
          </a>
        </div>

      </div>
    </div>
  </section>
</div>
