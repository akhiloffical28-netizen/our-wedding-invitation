@if (!isEnvelopeHidden) {
  <div 
    class="envelope-wrapper-stage" 
    [class.open]="isEnvelopeOpen()"
  >
    <div class="envelope-ambient-bg">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
    </div>

    <div class="envelope-container" (click)="openEnvelope()">
      
      <!-- Top Triangular Flap -->
      <div class="envelope-flap">
        <div class="flap-inner"></div>
      </div>

      <!-- Interactive Magical Golden Butterfly Seal Button -->
      <button 
        type="button" 
        class="butterfly-seal" 
        (click)="openEnvelope(); $event.stopPropagation()"
        aria-label="Tap Golden Butterfly to Open Invitation"
      >
        <div class="butterfly-container">
          
          <!-- Animated SVG Golden Butterfly -->
          <svg class="golden-butterfly-svg" viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="goldWingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fff59d" />
                <stop offset="50%" stop-color="#f59e0b" />
                <stop offset="100%" stop-color="#b45309" />
              </linearGradient>
              <linearGradient id="goldBodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fef08a" />
                <stop offset="100%" stop-color="#78350f" />
              </linearGradient>
              <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
              </filter>
            </defs>

            <!-- Left Wing -->
            <g class="wing left-wing">
              <path d="M50 40 C35 15, 10 5, 5 30 C2 45, 20 60, 48 45 Z" fill="url(#goldWingGrad)" stroke="#78350f" stroke-width="1.2" />
              <path d="M48 44 C30 50, 15 65, 25 75 C38 82, 48 58, 50 46 Z" fill="url(#goldWingGrad)" stroke="#78350f" stroke-width="1" />
              <!-- Wing Filigree -->
              <path d="M45 38 C32 22, 18 15, 12 30" stroke="#78350f" stroke-width="0.8" opacity="0.6" fill="none" />
              <path d="M45 42 C32 48, 22 58, 28 68" stroke="#78350f" stroke-width="0.8" opacity="0.6" fill="none" />
            </g>

            <!-- Right Wing -->
            <g class="wing right-wing">
              <path d="M50 40 C65 15, 90 5, 95 30 C98 45, 80 60, 52 45 Z" fill="url(#goldWingGrad)" stroke="#78350f" stroke-width="1.2" />
              <path d="M52 44 C70 50, 85 65, 75 75 C62 82, 52 58, 50 46 Z" fill="url(#goldWingGrad)" stroke="#78350f" stroke-width="1" />
              <!-- Wing Filigree -->
              <path d="M55 38 C68 22, 82 15, 88 30" stroke="#78350f" stroke-width="0.8" opacity="0.6" fill="none" />
              <path d="M55 42 C68 48, 78 58, 72 68" stroke="#78350f" stroke-width="0.8" opacity="0.6" fill="none" />
            </g>

            <!-- Butterfly Center Body & Antennae -->
            <path d="M50 22 C48 15, 42 8, 40 5 M50 22 C52 15, 58 8, 60 5" stroke="#78350f" stroke-width="1.5" stroke-linecap="round" fill="none" />
            <circle cx="40" cy="5" r="1.5" fill="#fef08a" />
            <circle cx="60" cy="5" r="1.5" fill="#fef08a" />
            <ellipse cx="50" cy="24" rx="3" ry="4" fill="url(#goldBodyGrad)" />
            <ellipse cx="50" cy="42" rx="3.5" ry="16" fill="url(#goldBodyGrad)" />
          </svg>

          <div class="butterfly-monogram">A & M</div>
        </div>
      </button>

      <!-- Front Envelope Pocket Body -->
      <div class="envelope-body">
        <div class="pocket-pattern"></div>
        <div class="envelope-front-details">
          <p class="invite-to">Exclusive Wedding Invitation</p>
          <h2 class="couple-title">Akhil & Mary</h2>
          <p class="tap-hint">Tap the golden butterfly to open</p>
        </div>
      </div>

      <!-- Invitation Card Inside Envelope that Slides Out -->
      <div class="invitation-card-preview">
        <div class="card-header">
          <span class="golden-crown">👑</span>
          <p>You Are Cordially Invited</p>
        </div>
        <h3>Akhil & Mary</h3>
        <p class="date-badge">January 31, 2027</p>
      </div>

    </div>

  </div>
}
