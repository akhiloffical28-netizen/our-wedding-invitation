@if (!isEnvelopeHidden) {
  <div 
    class="envelope-wrapper-stage" 
    [class.open]="isEnvelopeOpen()"
  >
    <!-- Background Ambient Floral Backdrop -->
    <div class="envelope-ambient-bg">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
    </div>

    <div class="envelope-container" (click)="openEnvelope()">
      
      <!-- Charcoal Black Triangular Top Flap (As seen in video!) -->
      <div class="envelope-flap-charcoal">
        <div class="flap-inner-dark"></div>
      </div>

      <!-- Golden Metallic Wax Stamp Seal Button (Center) -->
      <button 
        type="button" 
        class="wax-stamp-seal" 
        (click)="openEnvelope(); $event.stopPropagation()"
        aria-label="Tap Golden Wax Seal to Open Invitation"
      >
        <div class="wax-seal-container">
          <!-- 3D Gold Wax Stamp SVG -->
          <svg class="wax-seal-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="waxGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fff1aa" />
                <stop offset="30%" stop-color="#e6b800" />
                <stop offset="70%" stop-color="#b38600" />
                <stop offset="100%" stop-color="#664d00" />
              </linearGradient>
              <linearGradient id="waxRimGrad" x1="100%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffe680" />
                <stop offset="50%" stop-color="#cc9900" />
                <stop offset="100%" stop-color="#4d3900" />
              </linearGradient>
              <filter id="waxShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#3d2b0f" flood-opacity="0.45" />
              </filter>
            </defs>

            <!-- Outer Irregular Organic Wax Stamp Rim -->
            <path d="M50 4 C75 2, 96 22, 94 48 C92 76, 74 96, 48 95 C22 94, 4 74, 5 48 C6 22, 25 6, 50 4 Z" 
                  fill="url(#waxGoldGrad)" filter="url(#waxShadow)" />
            
            <!-- Inner Recessed Wax Ring -->
            <circle cx="50" cy="50" r="38" fill="url(#waxRimGrad)" stroke="#806000" stroke-width="1.5" />
            <circle cx="50" cy="50" r="34" fill="url(#waxGoldGrad)" opacity="0.9" />

            <!-- Interlocking Wedding Rings & Monogram Engraving -->
            <!-- Ring 1 -->
            <circle cx="43" cy="42" r="10" stroke="#4d3900" stroke-width="2.2" fill="none" />
            <!-- Ring 2 -->
            <circle cx="57" cy="42" r="10" stroke="#4d3900" stroke-width="2.2" fill="none" />
            <!-- Monogram Text -->
            <text x="50" y="68" font-family="'Cormorant Garamond', Georgia, serif" font-size="14" font-weight="bold" fill="#3d2b0f" text-anchor="middle" letter-spacing="1">A & M</text>
          </svg>

          <span class="wax-tap-hint">Tap to Open</span>
        </div>
      </button>

      <!-- Kraft Paper Envelope Front Pocket Body -->
      <div class="envelope-kraft-body">
        <div class="side-fold fold-left"></div>
        <div class="side-fold fold-right"></div>

        <div class="envelope-front-details">
          <p class="invite-to">The Wedding of</p>
          <h2 class="couple-title">Akhil & Mary</h2>
          <p class="tap-hint">Tap the golden seal to unseal invitation</p>
        </div>
      </div>

      <!-- Luxury Cream & Gold Invitation Card Inside -->
      <div class="invitation-card-preview">
        <div class="card-inner-border">
          <div class="card-header">
            <span class="golden-crown">✨</span>
            <p>Together With Their Families</p>
          </div>
          <h3>Akhil & Mary</h3>
          <p class="invite-subtext">Request the pleasure of your company</p>
          <p class="date-badge">Sunday, January 31, 2027</p>
        </div>
      </div>

    </div>

  </div>
}
